<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countryballs Corporate Strategy & Global Dominance</title>
    <style>
        * { box-sizing: border-box; font-family: 'Comic Sans MS', 'Arial', sans-serif; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #111424; color: #fff; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 10; }
        .screen.active { display: block; }
        #menu-screen { background: linear-gradient(180deg, #1f4068 0%, #111424 100%); overflow: hidden; }
        #canvas-balls { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .menu-container { position: relative; z-index: 5; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        h1.title { font-size: 42pt; text-shadow: 4px 4px 0px #e94560, -2px -2px 0px #000; color: #fff; margin-bottom: 30px; text-align: center; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        .menu-buttons { display: flex; flex-direction: column; gap: 15px; width: 320px; }
        .btn-menu { background: #e94560; border: 4px solid #fff; border-radius: 15px; color: #fff; padding: 12px; font-size: 16pt; font-weight: bold; cursor: pointer; box-shadow: 0 8px 0 #951f34; transition: all 0.1s ease; text-align: center; }
        .btn-menu:hover { background: #ff527b; transform: translateY(-2px); box-shadow: 0 10px 0 #951f34; }
        .btn-menu:active { transform: translateY(6px); box-shadow: 0 2px 0 #951f34; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 500px; background: #16213e; border: 5px solid #fff; border-radius: 20px; padding: 25px; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .modal h2 { margin-top: 0; color: #e94560; border-bottom: 3px dashed #fff; padding-bottom: 10px; }
        .modal-content { max-height: 300px; overflow-y: auto; font-size: 12pt; line-height: 1.5; margin-bottom: 20px; }
        .close-modal { background: #53354a; color: white; border: 2px solid white; padding: 8px 15px; border-radius: 10px; cursor: pointer; float: right; font-weight: bold; }
        #select-screen { background: #1a1a2e; padding: 20px; }
        .select-layout { display: flex; height: 90%; gap: 20px; margin-top: 20px; }
        .select-box { flex: 1; background: #16213e; border: 4px solid #e94560; border-radius: 15px; padding: 20px; overflow-y: auto; }
        .nation-item { display: flex; align-items: center; justify-content: space-between; background: #0f3460; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 2px solid transparent; cursor: pointer; }
        .nation-item:hover { border-color: #fff; background: #144272; }
        .nation-flag-mock { width: 40px; height: 25px; border: 2px solid #fff; border-radius: 3px; display: inline-block; vertical-align: middle; margin-right: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #e94560; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border-radius: 8px; border: none; background: #1a1a2e; color: #fff; font-size: 12pt; border: 2px solid #0f3460; }
        .flag-creator { display: flex; gap: 10px; margin-top: 10px; }
        .color-pick { width: 40px; height: 40px; border-radius: 50%; border: 3px solid #fff; cursor: pointer; }
        #game-screen { background: #0f3460; display: flex; flex-direction: column; }
        .top-bar { height: 75px; background: #16213e; border-bottom: 5px solid #e94560; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 20; position: relative; }
        .top-left, .top-center, .top-right { display: flex; align-items: center; gap: 15px; }
        .player-ball-hud { width: 50px; height: 50px; border-radius: 50%; border: 3px solid #fff; position: relative; box-shadow: inset -5px -5px 0 rgba(0,0,0,0.2), 0 4px 6px rgba(0,0,0,0.3); overflow: hidden; }
        .ball-eyes { position: absolute; top: 12px; left: 10px; width: 30px; height: 15px; display: flex; justify-content: space-between; }
        .ball-eye { width: 10px; height: 10px; background: #fff; border-radius: 50%; position: relative; border: 1.5px solid #000; }
        .ball-eye::after { content: ''; position: absolute; width: 4px; height: 4px; background: #000; border-radius: 50%; top: 2px; left: 2px; }
        .counter-box { background: #1a1a2e; border: 2px solid #fff; padding: 5px 15px; border-radius: 10px; text-align: center; min-width: 130px; }
        .counter-title { font-size: 9pt; color: #aaa; text-transform: uppercase; }
        .counter-val { font-size: 13pt; font-weight: bold; color: #4e9f3d; }
        .btn-circle { width: 45px; height: 45px; border-radius: 50%; background: #e94560; border: 3px solid #fff; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 0 #951f34; }
        .game-layout { flex: 1; display: flex; height: calc(100% - 75px); overflow: hidden; }
        .map-wrapper { flex: 3; display: flex; flex-direction: column; background: #1a1a2e; padding: 15px; gap: 10px; }
        .continent-filters { display: flex; gap: 10px; justify-content: center; }
        .btn-filter { background: #0f3460; border: 2px solid #fff; color: #fff; padding: 5px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-filter.active { background: #e94560; }
        .map-container { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); grid-auto-rows: minmax(130px, auto); gap: 12px; padding: 5px; }
        .map-cell { background: #16213e; border: 3px solid #0f3460; border-radius: 15px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px; cursor: pointer; transition: all 0.2s ease; }
        .map-cell:hover { border-color: #fff; transform: scale(1.03); z-index: 5; }
        .map-cell.player-controlled { border-color: #4e9f3d; background: #1f4068; box-shadow: 0 0 10px rgba(78,159,61,0.4); }
        .cell-flag { width: 50px; height: 50px; border-radius: 50%; border: 3px solid #fff; position: relative; margin-bottom: 5px; }
        .cell-name { font-weight: bold; font-size: 10pt; text-align: center; text-shadow: 1px 1px 2px #000; }
        .cell-stars { color: #ffd700; font-size: 9pt; margin-top: 2px; }
        .control-panel { flex: 1.3; background: #16213e; border-left: 5px solid #e94560; display: flex; flex-direction: column; overflow-y: auto; padding: 15px; }
        .panel-tab-title { font-size: 15pt; color: #e94560; font-weight: bold; margin-bottom: 15px; text-align: center; border-bottom: 3px solid #0f3460; padding-bottom: 5px; }
        .investment-card { background: #1a1a2e; border: 2px solid #0f3460; border-radius: 10px; padding: 10px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 5px; }
        .inv-info { display: flex; flex-direction: column; }
        .inv-name { font-weight: bold; font-size: 10pt; color: #fff; }
        .inv-level { font-size: 8pt; color: #e94560; }
        .btn-invest { background: #4e9f3d; color: white; border: 2px solid white; padding: 6px 10px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 9pt; }
    </style>
</head>
<body>

    <div id="menu-screen" class="screen active">
        <canvas id="canvas-balls"></canvas>
        <div class="menu-container">
            <h1 class="title">COUNTRYBALLS<br>GLOBAL DOMINANCE</h1>
            <div class="menu-buttons">
                <button class="btn-menu" onclick="showScreen('select-screen')">Nuova Partita</button>
                <button class="btn-menu" onclick="openModal('modal-howto')">Come Giocare</button>
            </div>
        </div>
    </div>

    <div id="modal-howto" class="modal">
        <h2>Come Giocare</h2>
        <div class="modal-content"><p>Scegli uno stato, migliora le tue statistiche ed espandi la tua influenza globale cliccando sulle altre nazioni!</p></div>
        <button class="close-modal" onclick="closeModal('modal-howto')">Chiudi</button>
    </div>

    <div id="select-screen" class="screen">
        <h2 style="text-align:center; color:#e94560; margin:20px 0;">Scegli la tua Nazione</h2>
        <div class="select-layout">
            <div class="select-box" id="nations-list"></div>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="top-bar">
            <div class="top-left">
                <div class="player-ball-hud" id="hud-ball"><div class="ball-eyes"><div class="ball-eye"></div><div class="ball-eye"></div></div></div>
                <div><div id="hud-time" style="font-weight:bold; font-size:11pt; color:#ffd700;">Anno: 2026</div><div id="hud-stars" style="color:#ffd700;">★☆☆☆☆</div></div>
            </div>
            <div class="top-center">
                <div class="counter-box"><div class="counter-title">Territorio</div><div class="counter-val" id="val-size">0 km²</div></div>
                <div class="counter-box"><div class="counter-title">Popolazione</div><div class="counter-val" id="val-pop" style="color:#00bcd4;">0</div></div>
                <div class="counter-box"><div class="counter-title">Budget</div><div class="counter-val" id="val-cash" style="color:#ffd700;">$0</div></div>
            </div>
            <div class="top-right"><div class="btn-circle" onclick="resetToMenu()">➔</div></div>
        </div>
        <div class="game-layout">
            <div class="map-wrapper">
                <div class="map-container" id="world-map"></div>
            </div>
            <div class="control-panel">
                <div class="panel-tab-title">Investimenti</div>
                <div id="investments-container"></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas-balls'); const ctx = canvas.getContext('2d');
        let menuBalls = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();
        for(let i=0; i<8; i++) { menuBalls.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, radius: 20, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, color: '#e94560' }); }
        function animateMenu() { if(document.getElementById('menu-screen').classList.contains('active')) { ctx.clearRect(0,0,canvas.width, canvas.height); menuBalls.forEach(b => { b.x += b.vx; b.y += b.vy; if(b.x-b.radius<0 || b.x+b.radius>canvas.width) b.vx*=-1; if(b.y-b.radius<0 || b.y+b.radius>canvas.height) b.vy*=-1; ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2); ctx.fillStyle = b.color; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.stroke(); }); } requestAnimationFrame(animateMenu); }
        animateMenu();

        let playerCountry = { name: "", size: 0, pop: 0, cash: 500000, color: "#fff", stars: 1, investments: { militar: 1, science: 1, economy: 1 } };
        const rami = [{id:'militar', name:'Tecnologia Militare', cost:40000}, {id:'science', name:'Ricerca Scientifica', cost:30000}, {id:'economy', name:'Infrastrutture', cost:50000}];
        let worldNations = [
            { name: "USA", stars: 5, size: 9834000, pop: 331000000, color: "#1a365d", continent: "america" },
            { name: "Brasile", stars: 3, size: 8515767, pop: 213000000, color: "#009c3b", continent: "america" },
            { name: "Francia", stars: 4, size: 643801, pop: 67000000, color: "#002395", continent: "europa" },
            { name: "Germania", stars: 4, size: 357022, pop: 83000000, color: "#111111", continent: "europa" },
            { name: "Giappone", stars: 4, size: 377975, pop: 125000000, color: "#cf142b", continent: "asia" }
        ];

        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); if(id==='select-screen') renderSelection(); if(id==='game-screen') initGame(); }
        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function renderSelection() {
            const c = document.getElementById('nations-list'); c.innerHTML = "<h3 style='color:#fff;'>Seleziona uno Stato per iniziare:</h3>";
            worldNations.forEach((nat, idx) => {
                let div = document.createElement('div'); div.className = "nation-item";
                div.innerHTML = `<span><div class="nation-flag-mock" style="background:${nat.color}"></div><b>${nat.name}</b></span>`;
                div.onclick = () => { playerCountry.name = nat.name; playerCountry.size = nat.size; playerCountry.pop = nat.pop; playerCountry.color = nat.color; playerCountry.stars = nat.stars; worldNations.splice(idx,1); showScreen('game-screen'); };
                c.appendChild(div);
            });
        }

        let loop;
        function initGame() {
            document.getElementById('hud-ball').style.backgroundColor = playerCountry.color; updateHUD(); buildMap(); renderInvestments();
            if(loop) clearInterval(loop);
            loop = setInterval(() => { playerCountry.cash += 5000 * playerCountry.investments.economy; updateHUD(); }, 2000);
        }

        function updateHUD() {
            document.getElementById('val-size').innerText = playerCountry.size.toLocaleString() + " km²";
            document.getElementById('val-pop').innerText = playerCountry.pop.toLocaleString();
            document.getElementById('val-cash').innerText = "$" + playerCountry.cash.toLocaleString();
        }

        function buildMap() {
            const m = document.getElementById('world-map'); m.innerHTML = "";
            let p = document.createElement('div'); p.className = "map-cell player-controlled";
            p.innerHTML = `<div class="cell-flag" style="background:${playerCountry.color}"></div><div class="cell-name">${playerCountry.name} (Tu)</div>`;
            m.appendChild(p);
            worldNations.forEach((nat, idx) => {
                let cell = document.createElement('div'); cell.className = "map-cell";
                cell.innerHTML = `<div class="cell-flag" style="background:${nat.color}"></div><div class="cell-name">${nat.name}</div><div class="cell-stars">${'★'.repeat(nat.stars)}</div>`;
                cell.onclick = () => {
                    let cost = nat.stars * 90000;
                    if(playerCountry.cash >= cost) { if(confirm(`Vuoi annettere ${nat.name} per $${cost}?`)) { playerCountry.cash -= cost; playerCountry.size += nat.size; playerCountry.pop += nat.pop; worldNations.splice(idx,1); buildMap(); updateHUD(); } } else { alert("Fondi insufficienti!"); }
                };
                m.appendChild(cell);
            });
        }

        function renderInvestments() {
            const c = document.getElementById('investments-container'); c.innerHTML = "";
            rami.forEach(r => {
                let lvl = playerCountry.investments[r.id]; let cost = r.cost * lvl;
                let card = document.createElement('div'); card.className = "investment-card";
                card.innerHTML = `<div class="inv-info"><span class="inv-name">${r.name}</span><span class="inv-level">Lvl: ${lvl}</span></div><button class="btn-invest" onclick="buyInv('${r.id}', ${cost})">Espandi ($${cost})</button>`;
                c.appendChild(card);
            });
        }
        function buyInv(id, cost) { if(playerCountry.cash >= cost) { playerCountry.cash -= cost; playerCountry.investments[id]++; renderInvestments(); updateHUD(); } }
        function resetToMenu() { clearInterval(loop); location.reload(); }
    </script>
</body>
</html>
